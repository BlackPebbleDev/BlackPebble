kind = "web"
previewPath = "/"
title = "Blackpebble"
version = "1.0.0"
id = "artifacts/blackpebble"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22779

[services.development]
run = "pnpm --filter @workspace/blackpebble run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/blackpebble", "run", "build" ]
publicDir = "artifacts/blackpebble/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22779"
BASE_PATH = "/"
